name: frontend-pages

on:
  push:
    branches: [main, master]
    paths:
      - "index.html"
      - "admin.html"
      - "style.css"
      - "admin.css"
      - "script.js"
      - "admin.js"
      - "config.js"
      - "sw.js"
      - "manifest.json"
      - "vendor/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html admin.html style.css admin.css script.js admin.js config.js sw.js manifest.json googlef9932d09b67957dc.html _site/
          if [ -d "PNG" ]; then cp -r PNG _site/; fi
          if [ -d "vendor" ]; then cp -r vendor _site/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
