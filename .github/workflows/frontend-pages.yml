name: frontend-pages

on:
  push:
    branches: [main, master]
    paths:
      - "index.html"
      - "admin.html"
      - "style.css"
      - "admin.css"
      - "script.js"
      - "sw.js"
      - "manifest.json"
      - ".github/workflows/frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            index.html
            admin.html
            style.css
            admin.css
            script.js
            sw.js
            manifest.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
