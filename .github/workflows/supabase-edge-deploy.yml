name: supabase-edge-deploy

on:
  push:
    branches: [main, master]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-edge-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function (api)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secrets."
            echo "Add them in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          supabase functions deploy api --project-ref "$SUPABASE_PROJECT_REF"

