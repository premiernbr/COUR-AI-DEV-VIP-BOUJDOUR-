services:
  db:
    image: postgres:16-alpine
    container_name: jd-boujdour-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d jd_boujdour"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jd-boujdour-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS}
      ADMIN_LOCKOUT_MAX_ATTEMPTS: ${ADMIN_LOCKOUT_MAX_ATTEMPTS}
      ADMIN_LOCKOUT_MINUTES: ${ADMIN_LOCKOUT_MINUTES}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SYNC_PASSWORD_ON_START: ${ADMIN_SYNC_PASSWORD_ON_START}
      LEADS_RATE_LIMIT_WINDOW_MS: ${LEADS_RATE_LIMIT_WINDOW_MS}
      LEADS_RATE_LIMIT_MAX: ${LEADS_RATE_LIMIT_MAX}
      ADMIN_RATE_LIMIT_WINDOW_MS: ${ADMIN_RATE_LIMIT_WINDOW_MS}
      ADMIN_RATE_LIMIT_MAX: ${ADMIN_RATE_LIMIT_MAX}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: nginx:1.27-alpine
    container_name: jd-boujdour-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./script.js:/usr/share/nginx/html/script.js:ro
      - ./admin.js:/usr/share/nginx/html/admin.js:ro
      - ./config.js:/usr/share/nginx/html/config.js:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./admin.css:/usr/share/nginx/html/admin.css:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
