server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; connect-src 'self' https://challenges.cloudflare.com https://api.openai.com https://wa.me https://api.whatsapp.com; frame-src https://challenges.cloudflare.com https://wa.me https://api.whatsapp.com; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me https://api.whatsapp.com" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
  gzip_min_length 1024;

  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /sw.js {
    add_header Cache-Control "no-cache";
  }

  location ~* \.(js|css|png|jpg|jpeg|jfif|svg|json)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /admin {
    try_files /admin.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
